server:
  port: 4444
  # слушать все интерфейсы (доступ с других машин в LAN)
  address: 0.0.0.0
  error:
    path: "/error"
    whitelabel:
      enabled: false

# Включать данное логирование если хотите посмотреть что происходит при старте
#logging:
#  level:
#    liquibase: DEBUG
#    org.springframework.boot.autoconfigure.liquibase: DEBUG
#    org.springframework.boot: DEBUG

spring:
  application:
    name: project
  liquibase:
    enabled: true
    change-log: classpath:/db.changelog/changelog-master.yml
    default-schema: public
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_DB_PORT:5432}/${POSTGRES_DB:all-on-sport}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: "org.postgresql.Driver"
    hikari:
      jdbc-url: jdbc:postgresql://localhost:${POSTGRES_DB_PORT:5432}/${POSTGRES_DB:all-on-sport}
      driver-class-name: "org.postgresql.Driver"
      username: ${POSTGRES_USER:postgres}
      password: ${POSTGRES_PASSWORD:2070}
      connection-timeout: 30000
      maximum-pool-size: 15
      minimum-idle: 10
      initialization-fail-timeout: 1
      leak-detection-threshold: 0
      pool-name: "[HikariPool-all-on-sport-pool]"
      register-mbeans: true
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: true
    hibernate:
      ddl-auto: validate

